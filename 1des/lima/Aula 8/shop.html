<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/shop.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="assets/img/LEGO_logo.svg.png">
            </div>


            <div class="busca">
                <input type="text" placeholder="Buscar...">
                <img src="assets/img/magnifying-glass-icon-11.png">

            </div>

            <div class="cadastro">
                <p>Entrar ou Cadastrar</p>
                <img src="assets/img/shopping-cart.png">
            </div>



        </nav>

        <div class="sub">
            <p>Contact</p>
            <p>FAQ</p>
        </div>
    </header>

    <main>
        <div class="grade">
            <div class="item">
                <img src="assets/img/itens/Euro.png" alt="sim">
                <p>
                    Euro
                    <br>
                    35$
                </p>
                <img src="assets/img/compre.png" class="compre">
            </div>
            <div class="item">
                <img src="assets/img/itens/Sony.png" alt="sim">
                <p>
                    Sony
                    <br>
                    35$
                </p>
                <img src="assets/img/compre.png" class="compre">
            </div>
            <div class="item">
                <img src="assets/img/itens/smile.png" alt="sim">
                <p>
                    Smile
                    <br>
                    35$
                </p>
                <img src="assets/img/compre.png" class="compre">
            </div>
            <div class="item">
                <img src="assets/img/itens/@.png" alt="sim">
                <p>
                    @
                    <br>
                    35$
                </p>
                <img src="assets/img/compre.png" class="compre">
            </div>

    </main>
</body>
</html>
